<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Social</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 40px;
      z-index: 10;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.3s;
    }
    nav a.visible { opacity: 0.7; }
    nav a:hover { opacity: 1; }

    .word {
      position: fixed;
      z-index: 11;
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      will-change: transform;
      pointer-events: none;
    }

    .hero-spacer { height: 100vh; }
    .content {
      position: relative;
      z-index: 1;
      min-height: 200vh;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <nav>
    <a href="#contact" id="contactLink">Contact</a>
  </nav>

  <div class="word" id="wordClub">Club</div>
  <div class="word" id="wordSocial">Social</div>

  <div class="hero-spacer"></div>
  <section class="content"></section>

  <script>
    const wordClub = document.getElementById('wordClub');
    const wordSocial = document.getElementById('wordSocial');
    const contactLink = document.getElementById('contactLink');

    const heroFontSize = () => Math.min(window.innerWidth * 0.12, 192);
    const navFontSize = 22;

    // Hero positions
    const clubHeroLeft = () => 60;
    const clubHeroTop = () => window.innerHeight * 0.4;
    const socialHeroLeft = () => 60;
    const socialHeroTop = () => window.innerHeight * 0.4 + heroFontSize() * 0.95;

    // Nav positions: "Club Social" with a gap
    const clubNavLeft = () => 40;
    const clubNavTop = () => 32;
    // Social goes right of Club in nav — estimate Club width at navFontSize
    const socialNavLeft = () => 40 + navFontSize * 2.8;
    const socialNavTop = () => 32;

    const scrollEnd = () => window.innerHeight * 0.5;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    function update() {
      const scrollY = window.scrollY;
      const end = scrollEnd();
      const rawProgress = Math.min(Math.max(scrollY / end, 0), 1);

      // Club moves slightly ahead, Social slightly behind
      const clubProgress = easeOut(Math.min(rawProgress * 1.15, 1));
      const socialProgress = easeOut(Math.min(Math.max((rawProgress - 0.08) * 1.2, 0), 1));

      // Club
      const clubFs = lerp(heroFontSize(), navFontSize, clubProgress);
      const clubL = lerp(clubHeroLeft(), clubNavLeft(), clubProgress);
      const clubT = lerp(clubHeroTop(), clubNavTop(), clubProgress);
      wordClub.style.fontSize = clubFs + 'px';
      wordClub.style.left = clubL + 'px';
      wordClub.style.top = clubT + 'px';

      // Social
      const socialFs = lerp(heroFontSize(), navFontSize, socialProgress);
      const socialL = lerp(socialHeroLeft(), socialNavLeft(), socialProgress);
      const socialT = lerp(socialHeroTop(), socialNavTop(), socialProgress);
      wordSocial.style.fontSize = socialFs + 'px';
      wordSocial.style.left = socialL + 'px';
      wordSocial.style.top = socialT + 'px';

      // Contact link
      if (rawProgress > 0.8) {
        contactLink.classList.add('visible');
      } else {
        contactLink.classList.remove('visible');
      }
    }

    window.addEventListener('scroll', update);
    window.addEventListener('resize', update);
    update();

    // --- Particles ---
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h, particles;
    let mouse = { x: -9999, y: -9999 };
    const repelRadius = 120;
    const repelStrength = 8;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      particles = [];
      const count = Math.floor((w * h) / 3000);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.5 + 0.5,
          ox: Math.random() * w,
          oy: Math.random() * h,
          dx: Math.random() * 40 + 15,
          dy: Math.random() * 40 + 15,
          sx: Math.random() * 0.0004 + 0.0001,
          sy: Math.random() * 0.0004 + 0.0001,
          phase: Math.random() * Math.PI * 2,
          alpha: Math.random() * 0.4 + 0.15,
        });
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) {
        let tx = p.ox + Math.sin(t * p.sx + p.phase) * p.dx;
        let ty = p.oy + Math.cos(t * p.sy + p.phase * 1.3) * p.dy;
        const dx = tx - mouse.x;
        const dy = ty - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < repelRadius && dist > 0) {
          const force = (1 - dist / repelRadius) * repelStrength;
          tx += (dx / dist) * force * 15;
          ty += (dy / dist) * force * 15;
        }
        p.x += (tx - p.x) * 0.15;
        p.y += (ty - p.y) * 0.15;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
    window.addEventListener('resize', () => { resize(); init(); });
    init();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
