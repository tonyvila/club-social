<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Social</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 40px;
      z-index: 10;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.3s;
    }
    nav a.visible { opacity: 0.7; }
    nav a:hover { opacity: 1; }

    .word {
      position: fixed;
      z-index: 11;
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      will-change: transform;
      pointer-events: none;
    }

    .hero-spacer { height: 100vh; }
    .content {
      position: relative;
      z-index: 1;
      min-height: 200vh;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <nav>
    <a href="#contact" id="contactLink">Contact</a>
  </nav>

  <div class="word" id="wordClub">Club</div>
  <div class="word" id="wordSocial">Social</div>

  <div class="hero-spacer"></div>
  <section class="content"></section>

  <script>
    // --- Word animations (unchanged) ---
    const wordClub = document.getElementById('wordClub');
    const wordSocial = document.getElementById('wordSocial');
    const contactLink = document.getElementById('contactLink');

    const heroFontSize = () => Math.min(window.innerWidth * 0.12, 192);
    const navFontSize = 22;

    const clubHeroLeft = () => 60;
    const clubHeroTop = () => window.innerHeight * 0.4;
    const socialHeroLeft = () => 60;
    const socialHeroTop = () => window.innerHeight * 0.4 + heroFontSize() * 0.95;

    const clubNavLeft = () => 40;
    const clubNavTop = () => 32;
    const socialNavLeft = () => 40 + navFontSize * 2.8;
    const socialNavTop = () => 32;

    const scrollEnd = () => window.innerHeight * 0.5;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    function updateWords() {
      const scrollY = window.scrollY;
      const end = scrollEnd();
      const rawProgress = Math.min(Math.max(scrollY / end, 0), 1);

      const clubProgress = easeOut(Math.min(rawProgress * 1.15, 1));
      const socialProgress = easeOut(Math.min(Math.max((rawProgress - 0.08) * 1.2, 0), 1));

      const clubFs = lerp(heroFontSize(), navFontSize, clubProgress);
      wordClub.style.fontSize = clubFs + 'px';
      wordClub.style.left = lerp(clubHeroLeft(), clubNavLeft(), clubProgress) + 'px';
      wordClub.style.top = lerp(clubHeroTop(), clubNavTop(), clubProgress) + 'px';

      const socialFs = lerp(heroFontSize(), navFontSize, socialProgress);
      wordSocial.style.fontSize = socialFs + 'px';
      wordSocial.style.left = lerp(socialHeroLeft(), socialNavLeft(), socialProgress) + 'px';
      wordSocial.style.top = lerp(socialHeroTop(), socialNavTop(), socialProgress) + 'px';

      if (rawProgress > 0.8) {
        contactLink.classList.add('visible');
      } else {
        contactLink.classList.remove('visible');
      }

      return rawProgress;
    }

    // --- Particles that form an image ---
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];
    let mouse = { x: -9999, y: -9999 };
    const repelRadius = 120;
    const repelStrength = 8;
    let imageData = null;
    let imgW = 0, imgH = 0;
    let scrollProgress = 0;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    // Load image and sample pixels
    function loadImage() {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          // Sample at reduced resolution
          const sampleCanvas = document.createElement('canvas');
          const sCtx = sampleCanvas.getContext('2d');
          
          // Target: fill viewport width, center vertically
          const aspect = img.height / img.width;
          imgW = Math.floor(w * 0.9);
          imgH = Math.floor(imgW * aspect);
          
          sampleCanvas.width = imgW;
          sampleCanvas.height = imgH;
          sCtx.drawImage(img, 0, 0, imgW, imgH);
          imageData = sCtx.getImageData(0, 0, imgW, imgH);
          resolve();
        };
        img.src = 'group.jpg';
      });
    }

    function createParticles() {
      particles = [];
      if (!imageData) return;

      const gap = 3; // Sample every N pixels
      const offsetX = (w - imgW) / 2;
      const offsetY = (h - imgH) / 2;

      for (let y = 0; y < imgH; y += gap) {
        for (let x = 0; x < imgW; x += gap) {
          const i = (y * imgW + x) * 4;
          const r = imageData.data[i];
          const g = imageData.data[i + 1];
          const b = imageData.data[i + 2];
          const brightness = 255 - (r + g + b) / 3;

          // Skip bright areas (white background)
          if (brightness < 30) continue;

          particles.push({
            // Random floating position
            rx: Math.random() * w,
            ry: Math.random() * h,
            // Organic drift
            dx: Math.random() * 40 + 15,
            dy: Math.random() * 40 + 15,
            sx: Math.random() * 0.0004 + 0.0001,
            sy: Math.random() * 0.0004 + 0.0001,
            phase: Math.random() * Math.PI * 2,
            // Image target position
            ix: offsetX + x,
            iy: offsetY + y,
            // Current position
            x: Math.random() * w,
            y: Math.random() * h,
            // Appearance
            r: Math.max(brightness / 255 * 2, 0.5),
            alpha: Math.min(brightness / 255 * 0.6 + 0.1, 0.7),
            brightness: brightness,
          });
        }
      }
    }

    async function initAll() {
      resize();
      await loadImage();
      createParticles();
    }

    function draw(t) {
      ctx.clearRect(0, 0, w, h);

      // Image formation starts after text animation begins
      const imgProgress = Math.min(Math.max((scrollProgress - 0.2) / 0.7, 0), 1);
      const imgEased = 1 - Math.pow(1 - imgProgress, 3);

      for (const p of particles) {
        // Floating position with organic movement
        const floatX = p.rx + Math.sin(t * p.sx + p.phase) * p.dx;
        const floatY = p.ry + Math.cos(t * p.sy + p.phase * 1.3) * p.dy;

        // Target: lerp between floating and image position
        let tx = lerp(floatX, p.ix, imgEased);
        let ty = lerp(floatY, p.iy, imgEased);

        // Mouse repel (weaker when forming image)
        const repelMult = 1 - imgEased * 0.7;
        const mdx = tx - mouse.x;
        const mdy = ty - mouse.y;
        const dist = Math.sqrt(mdx * mdx + mdy * mdy);
        if (dist < repelRadius && dist > 0) {
          const force = (1 - dist / repelRadius) * repelStrength * repelMult;
          tx += (mdx / dist) * force * 15;
          ty += (mdy / dist) * force * 15;
        }

        // Smooth follow
        p.x += (tx - p.x) * 0.12;
        p.y += (ty - p.y) * 0.12;

        // Size and alpha increase when forming image
        const drawR = lerp(p.r * 0.5, p.r, imgEased);
        const drawAlpha = lerp(p.alpha * 0.5, p.alpha, imgEased);

        ctx.beginPath();
        ctx.arc(p.x, p.y, drawR, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${drawAlpha})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    function onScroll() {
      scrollProgress = updateWords();
    }

    window.addEventListener('scroll', onScroll);
    window.addEventListener('resize', async () => {
      resize();
      await loadImage();
      createParticles();
      onScroll();
    });
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

    initAll().then(() => {
      onScroll();
      requestAnimationFrame(draw);
    });
  </script>
</body>
</html>
