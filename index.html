<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Social</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      padding: 60px;
    }

    .hero h1 {
      font-weight: 700;
      font-size: clamp(4rem, 12vw, 12rem);
      line-height: 0.9;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <section class="hero">
    <h1>Club<br>Social</h1>
  </section>
  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h, particles;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      particles = [];
      const count = Math.floor((w * h) / 3000);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.5 + 0.5,
          ox: Math.random() * w,
          oy: Math.random() * h,
          dx: Math.random() * 40 + 15,
          dy: Math.random() * 40 + 15,
          sx: Math.random() * 0.0004 + 0.0001,
          sy: Math.random() * 0.0004 + 0.0001,
          phase: Math.random() * Math.PI * 2,
          alpha: Math.random() * 0.4 + 0.15,
        });
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) {
        p.x = p.ox + Math.sin(t * p.sx + p.phase) * p.dx;
        p.y = p.oy + Math.cos(t * p.sy + p.phase * 1.3) * p.dy;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); init(); });
    init();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
