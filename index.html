  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 40px;
      z-index: 10;
      background: #000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    nav.visible { opacity: 1; }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    nav a.visible { opacity: 0.7; }
    nav a:hover { opacity: 1; }

    .word {
      position: fixed;
      z-index: 11;
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      will-change: transform;
      pointer-events: none;
    }

    .hero-spacer { height: 220vh; }

    .section {
      position: relative;
      margin: 0;
      padding: 0;
      border: 0;
      background: #000;
    }
    .video-section {
      margin: 0;
      padding: 0;
      line-height: 0;
      font-size: 0;
      background: #000;
    }

    .section-bar {
      position: sticky;
      z-index: 6;
      height: 36px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      padding: 0 40px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      top: 64px;
      border-bottom: 1px solid rgba(0,0,0,0.15);
      margin: 0;
    }

    .video-row {
      display: flex;
      width: 100%;
      background: #000;
      margin: 0;
      padding: 0;
      gap: 0;
    }
    .video-row video {
      flex: 1;
      width: 33.333%;
      height: auto;
      display: block;
      object-fit: cover;
      margin: -9px 0;
      padding: 0;
    }
    .video-row-clip {
      margin: 0;
      padding: 0;
      line-height: 0;
      font-size: 0;
    }

    @media (max-width: 768px) {
      body { overflow-x: hidden; }
      .video-section {
        position: relative;
        height: 250vh;
      }
      .video-row-clip {
        position: sticky;
        top: 100px;
        width: 100vw;
        overflow: hidden;
      }
      .video-row-clip .video-row {
        display: flex;
        flex-wrap: nowrap;
        width: 300vw;
        will-change: transform;
      }
      .video-row-clip .video-row video {
        flex: 0 0 100vw;
        width: 100vw;
      }
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 200vh;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <nav>

  <div class="word" id="wordClub">Club</div>

  <div class="section" style="z-index:5">

        <div class="video-row">
          <video autoplay muted loop playsinline><source src="video7.webm" type="video/webm"><source src="video7.mp4" type="video/mp4"></video>
          <video autoplay muted loop playsinline><source src="video8.webm" type="video/webm"><source src="video8.mp4" type="video/mp4"></video>
          <video autoplay muted loop playsinline><source src="video9.webm" type="video/webm"><source src="video9.mp4" type="video/mp4"></video>

  <div class="section" style="z-index:8">

    <div class="video-section">
      <div class="video-row-clip">

          <video muted loop playsinline><source src="video10.webm" type="video/webm"></video>
          <video muted loop playsinline><source src="video11.webm" type="video/webm"></video>

  </div>
  <div class="section" style="z-index:9">
    <div class="section-bar">Baile de la Piñata 2025</div>
    <div class="video-section">
      <div class="video-row-clip">
        <div class="video-row">
          <video muted loop playsinline><source src="video13.webm" type="video/webm"></video>
          <video muted loop playsinline><source src="video14.webm" type="video/webm"></video>
          <video muted loop playsinline><source src="video15.webm" type="video/webm"></video>
        </div>
      </div>
    </div>
  </div>
  <div class="section" style="z-index:10">
    <div class="section-bar">Nochevieja 2024</div>
    <div class="video-section">
      <div class="video-row-clip">
        <div class="video-row">
          <video muted loop playsinline><source src="video18.webm" type="video/webm"></video>
          <video muted loop playsinline><source src="video16.webm" type="video/webm"></video>
          <video muted loop playsinline><source src="video17.webm" type="video/webm"></video>
        </div>
      </div>
    </div>
  </div>
  <section class="content"></section>

  <script>
    const wordClub = document.getElementById('wordClub');
    const wordSocial = document.getElementById('wordSocial');
    const contactLink = document.getElementById('contactLink');
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    const navFontSize = 16;
    let w, h, particles = [], scrollProgress = 0;
    let mouse = { x: -9999, y: -9999 };
    const repelRadius = 120;
    const repelSq = repelRadius * repelRadius;
    const repelStrength = 8;
    let imageData = null, imgW = 0, imgH = 0;

    const heroFontSize = () => Math.min(window.innerWidth * 0.18, 280);
    const scrollEnd = () => window.innerHeight * 1.5;

    // Measure "CLUB" width at nav font size
    function measureClubNavWidth() {
      const span = document.createElement('span');
      span.style.cssText = `position:absolute;visibility:hidden;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:300;font-size:${navFontSize}px;letter-spacing:-0.03em;text-transform:uppercase;`;
      span.textContent = 'Club ';
      document.body.appendChild(span);
      const w = span.offsetWidth;
      document.body.removeChild(span);
      return w;
    }
    let clubNavW = 0;
    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    // --- Scroll handler (passive, reads scrollY, sets scrollProgress) ---
    function onScroll() {
      const scrollY = window.scrollY;
      const end = scrollEnd();
      const raw = Math.min(Math.max(scrollY / end, 0), 1);
      scrollProgress = raw;

      const cp = easeOut(Math.min(raw * 1.15, 1));
      const sp = easeOut(Math.min(Math.max((raw - 0.08) * 1.2, 0), 1));
      const hfs = heroFontSize();

      const navCenterY = (64 - navFontSize) / 2;
      wordClub.style.cssText = `position:fixed;z-index:11;font-weight:300;line-height:1;letter-spacing:-0.03em;text-transform:uppercase;white-space:nowrap;pointer-events:none;font-size:${lerp(hfs, navFontSize, cp)}px;left:${lerp(20, 40, cp)}px;top:${lerp(window.innerHeight * 0.4, navCenterY, cp)}px`;
      wordSocial.style.cssText = `position:fixed;z-index:11;font-weight:700;line-height:1;letter-spacing:-0.03em;text-transform:uppercase;white-space:nowrap;pointer-events:none;font-size:${lerp(hfs, navFontSize, sp)}px;left:${lerp(20, 40 + clubNavW, sp)}px;top:${lerp(window.innerHeight * 0.4 + hfs * 0.95, navCenterY, sp)}px`;

      const nav = document.querySelector('nav');
      if (raw > 0.8) {
        nav.classList.add('visible');
        contactLink.classList.add('visible');
      } else {
        nav.classList.remove('visible');
        contactLink.classList.remove('visible');
      }
    }

    // --- Image loading ---
    function loadImage() {
      return new Promise(r => {
        const img = new Image();
        img.onload = () => {
          const sc = document.createElement('canvas');
          const sCtx = sc.getContext('2d');
          const aspect = img.height / img.width;
          imgW = Math.floor(w * 0.85);
          imgH = Math.floor(imgW * aspect);
          sc.width = imgW; sc.height = imgH;
          sCtx.drawImage(img, 0, 0, imgW, imgH);
          imageData = sCtx.getImageData(0, 0, imgW, imgH);
          r();
        };
        img.src = 'group.jpg';
      });
    }

    const isMobile = () => window.innerWidth <= 768;
    const MAX_PARTICLES_DESKTOP = 35000;
    const MAX_PARTICLES_MOBILE = 12000;

    function createParticles() {
      particles = [];
      if (!imageData) return;
      const mobile = isMobile();
      const gap = mobile ? 4 : 2;
      const maxP = mobile ? MAX_PARTICLES_MOBILE : MAX_PARTICLES_DESKTOP;
      const ox = (w - imgW) / 2;
      const oy = (h - imgH) / 2;
      const d = imageData.data;
      // First pass: collect candidates
      const candidates = [];
      for (let y = 0; y < imgH; y += gap) {
        const row = y * imgW;
        for (let x = 0; x < imgW; x += gap) {
          const i = (row + x) * 4;
          const brightness = 255 - (d[i] + d[i+1] + d[i+2]) / 3;
          if (brightness < 30) continue;
          candidates.push({ x, y, brightness });
        }
      }
      // Downsample if over cap
      let selected = candidates;
      if (candidates.length > maxP) {
        const step = candidates.length / maxP;
        selected = [];
        for (let i = 0; i < maxP; i++) {
          selected.push(candidates[Math.floor(i * step)]);
        }
      }
      const jitter = gap * 2.5;
      for (const c of selected) {
        particles.push({
          rx: Math.random() * w, ry: Math.random() * h,
          dx: Math.random() * 40 + 15, dy: Math.random() * 40 + 15,
          sx: Math.random() * 0.0004 + 0.0001, sy: Math.random() * 0.0004 + 0.0001,
          phase: Math.random() * Math.PI * 2,
          ix: ox + c.x + (Math.random() - 0.5) * jitter,
          iy: oy + c.y + (Math.random() - 0.5) * jitter,
          x: Math.random() * w, y: Math.random() * h,
          r: Math.random() * 0.6 + 0.2,
          alpha: Math.min(c.brightness / 255 * 0.4 + 0.1, 0.5),
        });
      }
    }

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    // --- Main draw loop ---
    let lastFrameTime = 0;
    const FRAME_INTERVAL_MOBILE = 1000 / 30; // 30fps on mobile

    function draw(t) {
      requestAnimationFrame(draw);

      // Throttle to 30fps on mobile
      if (isMobile()) {
        if (t - lastFrameTime < FRAME_INTERVAL_MOBILE) return;
        lastFrameTime = t;
      }

      ctx.clearRect(0, 0, w, h);

      // Image forms 0.15–0.4, holds 0.4–0.75, dissolves 0.75–0.95
      let imgE;
      if (scrollProgress < 0.15) {
        imgE = 0;
      } else if (scrollProgress < 0.4) {
        const t2 = (scrollProgress - 0.15) / 0.25;
        imgE = 1 - Math.pow(1 - t2, 3);
      } else if (scrollProgress < 0.75) {
        imgE = 1;
      } else if (scrollProgress < 0.95) {
        imgE = Math.pow(1 - (scrollProgress - 0.75) / 0.2, 3);
      } else {
        imgE = 0;
      }
      const repelMult = 1 - imgE * 0.7;
      const mx = mouse.x, my = mouse.y;
      const len = particles.length;

      // Batch by alpha (round to 1 decimal) to reduce fillStyle changes
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      let lastAlpha = 0.3;

      for (let i = 0; i < len; i++) {
        const p = particles[i];

        // Target position
        const floatX = p.rx + Math.sin(t * p.sx + p.phase) * p.dx;
        const floatY = p.ry + Math.cos(t * p.sy + p.phase * 1.3) * p.dy;
        let tx = floatX + (p.ix - floatX) * imgE;
        let ty = floatY + (p.iy - floatY) * imgE;

        // Mouse repel (skip sqrt when outside radius)
        const mdx = tx - mx;
        const mdy = ty - my;
        const distSq = mdx * mdx + mdy * mdy;
        if (distSq < repelSq && distSq > 0) {
          const dist = Math.sqrt(distSq);
          const force = (1 - dist / repelRadius) * repelStrength * repelMult;
          const f15 = force * 15 / dist;
          tx += mdx * f15;
          ty += mdy * f15;
        }

        // Smooth follow
        p.x += (tx - p.x) * 0.12;
        p.y += (ty - p.y) * 0.12;

        // Skip offscreen
        if (p.x < -5 || p.x > w + 5 || p.y < -5 || p.y > h + 5) continue;

        const a = Math.round(p.alpha * 10) / 10;
        if (a !== lastAlpha) {
          ctx.fillStyle = `rgba(255,255,255,${a})`;
          lastAlpha = a;
        }

        // fillRect is ~3x faster than arc for tiny dots
        const d = p.r * 2;
        ctx.fillRect(p.x - p.r, p.y - p.r, d, d);
      }
    }

    // --- Mobile horizontal video scroll ---
    function updateVideoScroll() {
      if (window.innerWidth > 768) return;
      const vw = window.innerWidth;
      document.querySelectorAll('.video-section').forEach(sec => {
        const clip = sec.querySelector('.video-row-clip');
        const row = sec.querySelector('.video-row');
        const count = row.children.length;
        const rect = sec.getBoundingClientRect();
        const clipH = clip.offsetHeight;
        const travel = sec.offsetHeight - clipH;
        if (travel <= 0) return;
        const progress = Math.min(Math.max(-rect.top / travel, 0), 1);
        row.style.transform = `translateX(-${progress * vw * (count - 1)}px)`;
      });
    }

    // --- Lazy-load videos: only play when visible ---
    const videoObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.play().catch(() => {});
        } else {
          entry.target.pause();
        }
      });
    }, { rootMargin: '200px' });

    document.querySelectorAll('video').forEach(v => {
      v.removeAttribute('autoplay');
      v.pause();
      videoObserver.observe(v);
    });

    // --- Events ---
    window.addEventListener('scroll', () => { onScroll(); updateVideoScroll(); }, { passive: true });
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; }, { passive: true });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
    let lastW = 0, lastH = 0;
    window.addEventListener('resize', async () => {
      const newW = window.innerWidth;
      const newH = window.innerHeight;
      // Skip if only height changed slightly (mobile URL bar)
      if (newW === lastW && Math.abs(newH - lastH) < 150) {
        resize();
        onScroll();
        return;
      }
      lastW = newW;
      lastH = newH;
      resize();
      await loadImage();
      createParticles();
      onScroll();
    });

    // Init
    (async () => {
      resize();
      lastW = window.innerWidth;
      lastH = window.innerHeight;
      clubNavW = measureClubNavWidth();
      await loadImage();
      createParticles();
      onScroll();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
