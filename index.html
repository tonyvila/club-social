<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Social</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Navbar */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    nav.visible {
      opacity: 1;
      pointer-events: auto;
    }
    nav .nav-logo {
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 400;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    nav a:hover { opacity: 1; }

    /* Hero */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      padding: 60px;
    }

    .hero h1 {
      font-weight: 700;
      font-size: clamp(4rem, 12vw, 12rem);
      line-height: 0.9;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      transition: opacity 0.4s, transform 0.4s;
    }
    .hero h1.fading {
      opacity: 0;
      transform: translateY(-30px);
    }

    /* Content sections */
    .content {
      position: relative;
      z-index: 1;
      min-height: 200vh;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <nav id="navbar">
    <span class="nav-logo">Club Social</span>
    <a href="#contact">Contact</a>
  </nav>

  <section class="hero" id="hero">
    <h1 id="heroTitle">Club<br>Social</h1>
  </section>

  <section class="content">
  </section>

  <script>
    // --- Scroll: hero title fades → navbar appears ---
    const heroTitle = document.getElementById('heroTitle');
    const navbar = document.getElementById('navbar');
    const hero = document.getElementById('hero');

    function onScroll() {
      const scrollY = window.scrollY;
      const triggerStart = window.innerHeight * 0.3;
      const triggerEnd = window.innerHeight * 0.6;

      if (scrollY > triggerStart) {
        heroTitle.classList.add('fading');
      } else {
        heroTitle.classList.remove('fading');
      }

      if (scrollY > triggerEnd) {
        navbar.classList.add('visible');
      } else {
        navbar.classList.remove('visible');
      }
    }

    window.addEventListener('scroll', onScroll);
    onScroll();

    // --- Particles ---
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h, particles;
    let mouse = { x: -9999, y: -9999 };
    const repelRadius = 120;
    const repelStrength = 8;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      particles = [];
      const count = Math.floor((w * h) / 3000);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.5 + 0.5,
          ox: Math.random() * w,
          oy: Math.random() * h,
          dx: Math.random() * 40 + 15,
          dy: Math.random() * 40 + 15,
          sx: Math.random() * 0.0004 + 0.0001,
          sy: Math.random() * 0.0004 + 0.0001,
          phase: Math.random() * Math.PI * 2,
          alpha: Math.random() * 0.4 + 0.15,
        });
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) {
        let tx = p.ox + Math.sin(t * p.sx + p.phase) * p.dx;
        let ty = p.oy + Math.cos(t * p.sy + p.phase * 1.3) * p.dy;
        const dx = tx - mouse.x;
        const dy = ty - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < repelRadius && dist > 0) {
          const force = (1 - dist / repelRadius) * repelStrength;
          tx += (dx / dist) * force * 15;
          ty += (dy / dist) * force * 15;
        }
        p.x += (tx - p.x) * 0.15;
        p.y += (ty - p.y) * 0.15;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
    window.addEventListener('resize', () => { resize(); init(); });
    init();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
