<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Social</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Navbar - always present but Contact hidden until scrolled */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 40px;
      z-index: 10;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.3s;
    }
    nav a.visible { opacity: 0.7; }
    nav a:hover { opacity: 1; }

    /* Floating title — moves from hero position to navbar */
    .floating-title {
      position: fixed;
      z-index: 11;
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      will-change: transform, font-size, left, top;
    }

    /* Spacers */
    .hero-spacer {
      height: 100vh;
    }
    .content {
      position: relative;
      z-index: 1;
      min-height: 200vh;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <nav>
    <a href="#contact" id="contactLink">Contact</a>
  </nav>

  <div class="floating-title" id="floatingTitle"><span id="wordClub">Club</span><br id="titleBr"><span id="wordSocial">Social</span></div>

  <div class="hero-spacer"></div>
  <section class="content"></section>

  <script>
    // --- Scroll-driven title animation ---
    const title = document.getElementById('floatingTitle');
    const contactLink = document.getElementById('contactLink');

    // Hero position: left-aligned, vertically centered
    const heroFontSize = () => Math.min(window.innerWidth * 0.12, 192);
    const heroLeft = () => 60;
    const heroTop = () => window.innerHeight * 0.5;

    // Nav position: top-left, small
    const navFontSize = 22;
    const navLeft = () => 40;
    const navTop = () => 32;

    const scrollStart = 0;
    const scrollEnd = () => window.innerHeight * 0.5;

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function updateTitle() {
      const scrollY = window.scrollY;
      const end = scrollEnd();
      let progress = Math.min(Math.max((scrollY - scrollStart) / end, 0), 1);
      // Ease out cubic
      progress = 1 - Math.pow(1 - progress, 3);

      const fontSize = lerp(heroFontSize(), navFontSize, progress);
      const left = lerp(heroLeft(), navLeft(), progress);
      // Hero: bottom-aligned, so we use baseline. Nav: centered in navbar.
      const top = lerp(heroTop(), navTop(), progress);

      title.style.fontSize = fontSize + 'px';
      title.style.left = left + 'px';
      title.style.top = top + 'px';
      // At hero size, align to bottom (transform origin bottom-left)
      title.style.transformOrigin = 'bottom left';
      // Translate Y so at progress=0 text sits above the bottom line
      title.style.transform = `translateY(${lerp(0, -50, progress)}%)`;

      // Collapse two lines into one line
      const br = document.getElementById('titleBr');
      if (progress > 0.3) {
        br.style.display = 'none';
      } else {
        br.style.display = '';
      }

      // Show contact link after scroll
      if (progress > 0.8) {
        contactLink.classList.add('visible');
      } else {
        contactLink.classList.remove('visible');
      }
    }

    window.addEventListener('scroll', updateTitle);
    window.addEventListener('resize', updateTitle);
    updateTitle();

    // --- Particles ---
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h, particles;
    let mouse = { x: -9999, y: -9999 };
    const repelRadius = 120;
    const repelStrength = 8;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      particles = [];
      const count = Math.floor((w * h) / 3000);
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.5 + 0.5,
          ox: Math.random() * w,
          oy: Math.random() * h,
          dx: Math.random() * 40 + 15,
          dy: Math.random() * 40 + 15,
          sx: Math.random() * 0.0004 + 0.0001,
          sy: Math.random() * 0.0004 + 0.0001,
          phase: Math.random() * Math.PI * 2,
          alpha: Math.random() * 0.4 + 0.15,
        });
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) {
        let tx = p.ox + Math.sin(t * p.sx + p.phase) * p.dx;
        let ty = p.oy + Math.cos(t * p.sy + p.phase * 1.3) * p.dy;
        const dx = tx - mouse.x;
        const dy = ty - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < repelRadius && dist > 0) {
          const force = (1 - dist / repelRadius) * repelStrength;
          tx += (dx / dist) * force * 15;
          ty += (dy / dist) * force * 15;
        }
        p.x += (tx - p.x) * 0.15;
        p.y += (ty - p.y) * 0.15;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
    window.addEventListener('resize', () => { resize(); init(); });
    init();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
