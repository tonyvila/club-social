<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Social</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 40px;
      z-index: 10;
      background: #000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    nav.visible { opacity: 1; }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      opacity: 0;
      transition: opacity 0.3s;
    }
    nav a.visible { opacity: 0.7; }
    nav a:hover { opacity: 1; }

    .word {
      position: fixed;
      z-index: 11;
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      white-space: nowrap;
      will-change: transform;
      pointer-events: none;
    }

    .hero-spacer { height: 300vh; }

    .sections-wrapper {
      position: relative;
      z-index: 5;
    }

    .section-bar {
      position: sticky;
      z-index: 6;
      height: 36px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      padding: 0 40px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .section-bar:nth-of-type(1) { top: 64px; z-index: 8; }
    .section-bar:nth-of-type(2) { top: 100px; z-index: 7; }
    .section-bar:nth-of-type(3) { top: 136px; z-index: 6; }

    .video-row {
      display: flex;
      width: 100%;
      background: #000;
    }
    .video-row video {
      flex: 1;
      width: 33.333%;
      display: block;
      object-fit: cover;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 200vh;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <nav>
    <a href="#contact" id="contactLink">Contact</a>
  </nav>

  <div class="word" id="wordClub">Club</div>
  <div class="word" id="wordSocial">Social</div>

  <div class="hero-spacer"></div>
  <div class="sections-wrapper">
    <div class="section-bar">Nochevieja 2025</div>
    <div class="video-row">
      <video src="video1.mp4" autoplay muted loop playsinline></video>
      <video src="video2.mp4" autoplay muted loop playsinline></video>
      <video src="video3.mp4" autoplay muted loop playsinline></video>
    </div>
    <div class="section-bar">Lujuria Nov 2025</div>
    <div class="video-row">
      <video src="video4.mp4" autoplay muted loop playsinline></video>
      <video src="video5.mp4" autoplay muted loop playsinline></video>
      <video src="video6.mp4" autoplay muted loop playsinline></video>
    </div>
    <div class="section-bar">La Mar de Músicas 2025 Afterparty</div>
  </div>
  <section class="content"></section>

  <script>
    const wordClub = document.getElementById('wordClub');
    const wordSocial = document.getElementById('wordSocial');
    const contactLink = document.getElementById('contactLink');
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    const navFontSize = 16;
    let w, h, particles = [], scrollProgress = 0;
    let mouse = { x: -9999, y: -9999 };
    const repelRadius = 120;
    const repelSq = repelRadius * repelRadius;
    const repelStrength = 8;
    let imageData = null, imgW = 0, imgH = 0;

    const heroFontSize = () => Math.min(window.innerWidth * 0.12, 192);
    const scrollEnd = () => window.innerHeight * 1.5;
    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    // --- Scroll handler (passive, reads scrollY, sets scrollProgress) ---
    function onScroll() {
      const scrollY = window.scrollY;
      const end = scrollEnd();
      const raw = Math.min(Math.max(scrollY / end, 0), 1);
      scrollProgress = raw;

      const cp = easeOut(Math.min(raw * 1.15, 1));
      const sp = easeOut(Math.min(Math.max((raw - 0.08) * 1.2, 0), 1));
      const hfs = heroFontSize();

      wordClub.style.cssText = `position:fixed;z-index:11;font-weight:700;line-height:0.9;letter-spacing:-0.03em;text-transform:uppercase;white-space:nowrap;pointer-events:none;font-size:${lerp(hfs, navFontSize, cp)}px;left:${lerp(60, 40, cp)}px;top:${lerp(window.innerHeight * 0.4, 24, cp)}px`;
      wordSocial.style.cssText = `position:fixed;z-index:11;font-weight:700;line-height:0.9;letter-spacing:-0.03em;text-transform:uppercase;white-space:nowrap;pointer-events:none;font-size:${lerp(hfs, navFontSize, sp)}px;left:${lerp(60, 40 + navFontSize * 3, sp)}px;top:${lerp(window.innerHeight * 0.4 + hfs * 0.95, 24, sp)}px`;

      const nav = document.querySelector('nav');
      if (raw > 0.8) {
        nav.classList.add('visible');
        contactLink.classList.add('visible');
      } else {
        nav.classList.remove('visible');
        contactLink.classList.remove('visible');
      }
    }

    // --- Image loading ---
    function loadImage() {
      return new Promise(r => {
        const img = new Image();
        img.onload = () => {
          const sc = document.createElement('canvas');
          const sCtx = sc.getContext('2d');
          const aspect = img.height / img.width;
          imgW = Math.floor(w * 0.65);
          imgH = Math.floor(imgW * aspect);
          sc.width = imgW; sc.height = imgH;
          sCtx.drawImage(img, 0, 0, imgW, imgH);
          imageData = sCtx.getImageData(0, 0, imgW, imgH);
          r();
        };
        img.src = 'group.jpg';
      });
    }

    function createParticles() {
      particles = [];
      if (!imageData) return;
      const gap = 3;
      const ox = (w - imgW) / 2;
      const oy = (h - imgH) / 2;
      const d = imageData.data;
      for (let y = 0; y < imgH; y += gap) {
        const row = y * imgW;
        for (let x = 0; x < imgW; x += gap) {
          const i = (row + x) * 4;
          const brightness = 255 - (d[i] + d[i+1] + d[i+2]) / 3;
          if (brightness < 30) continue;
          const jitter = gap * 2.5;
          particles.push({
            rx: Math.random() * w, ry: Math.random() * h,
            dx: Math.random() * 40 + 15, dy: Math.random() * 40 + 15,
            sx: Math.random() * 0.0004 + 0.0001, sy: Math.random() * 0.0004 + 0.0001,
            phase: Math.random() * Math.PI * 2,
            ix: ox + x + (Math.random() - 0.5) * jitter,
            iy: oy + y + (Math.random() - 0.5) * jitter,
            x: Math.random() * w, y: Math.random() * h,
            r: Math.random() * 0.8 + 0.3,
            alpha: Math.min(brightness / 255 * 0.4 + 0.1, 0.5),
          });
        }
      }
    }

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    // --- Main draw loop ---
    function draw(t) {
      ctx.clearRect(0, 0, w, h);

      const imgP = Math.min(Math.max((scrollProgress - 0.2) / 0.7, 0), 1);
      const imgE = 1 - Math.pow(1 - imgP, 3);
      const repelMult = 1 - imgE * 0.7;
      const mx = mouse.x, my = mouse.y;
      const len = particles.length;

      // Batch by alpha (round to 1 decimal) to reduce fillStyle changes
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      let lastAlpha = 0.3;

      for (let i = 0; i < len; i++) {
        const p = particles[i];

        // Target position
        const floatX = p.rx + Math.sin(t * p.sx + p.phase) * p.dx;
        const floatY = p.ry + Math.cos(t * p.sy + p.phase * 1.3) * p.dy;
        let tx = floatX + (p.ix - floatX) * imgE;
        let ty = floatY + (p.iy - floatY) * imgE;

        // Mouse repel (skip sqrt when outside radius)
        const mdx = tx - mx;
        const mdy = ty - my;
        const distSq = mdx * mdx + mdy * mdy;
        if (distSq < repelSq && distSq > 0) {
          const dist = Math.sqrt(distSq);
          const force = (1 - dist / repelRadius) * repelStrength * repelMult;
          const f15 = force * 15 / dist;
          tx += mdx * f15;
          ty += mdy * f15;
        }

        // Smooth follow
        p.x += (tx - p.x) * 0.12;
        p.y += (ty - p.y) * 0.12;

        // Skip offscreen
        if (p.x < -5 || p.x > w + 5 || p.y < -5 || p.y > h + 5) continue;

        const a = Math.round(p.alpha * 10) / 10;
        if (a !== lastAlpha) {
          ctx.fillStyle = `rgba(255,255,255,${a})`;
          lastAlpha = a;
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, 6.283);
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    // --- Events ---
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; }, { passive: true });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
    window.addEventListener('resize', async () => {
      resize();
      await loadImage();
      createParticles();
      onScroll();
    });

    // Init
    (async () => {
      resize();
      await loadImage();
      createParticles();
      onScroll();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
